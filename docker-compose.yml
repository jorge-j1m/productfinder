services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productfinder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    working_dir: /app/apps/server
    command: ["bunx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/productfinder
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/productfinder
      BETTER_AUTH_SECRET: docker-dev-secret-change-in-production
      SERVER_URL: ${SERVER_URL}
      ADMIN_CLIENT_URL: ${ADMIN_CLIENT_URL}
      WEB_CLIENT_URL: ${WEB_CLIENT_URL}
      NODE_ENV: ${SERVER_NODE_ENV}
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin-panel:
    build:
      context: .
      dockerfile: apps/admin-panel/Dockerfile
      args:
        ADMIN_PANEL_API_URL: ${ADMIN_PANEL_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        WEB_API_URL: ${WEB_API_URL}
    ports:
      - "3001:3001"
    depends_on:
      server:
        condition: service_started

  pf-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - server

volumes:
  pgdata:
