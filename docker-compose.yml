services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productfinder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    working_dir: /app/apps/server
    command: ["bunx", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/productfinder
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/productfinder
      BETTER_AUTH_SECRET: docker-dev-secret-change-in-production
      BETTER_AUTH_URL: http://localhost:8080
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
